services:
  chatgpt-auto-image:
    build: .
    container_name: chatgpt-auto-image
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      PORT: "3000"
      DATA_DIR: /app/data
      BROWSER_PROFILE_DIR: /app/browser-profile
      DISPLAY: ${DISPLAY:-:0}
    volumes:
      - ./data:/app/data
      - ./browser-profile:/app/browser-profile
      - /tmp/.X11-unix:/tmp/.X11-unix
    shm_size: "1gb"
    stdin_open: true
    tty: true
